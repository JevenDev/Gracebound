modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL = "${mod_issue_tracker}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
# Gracebound uses a runtime hello handshake for enhanced mode, so clients can safely connect to servers without Gracebound.
displayTest="IGNORE_SERVER_VERSION"
logoFile="logo.png"
authors="${mod_authors}"
displayURL="${mod_display_url}"
description='''
${mod_description}
'''

#[[mixins]]
#config="gracebound.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="toucanlib"
type="required"
versionRange="[${toucanlib_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="xaerominimap"
type="optional"
versionRange="[1.21.1,)"
ordering="NONE"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="xaeroworldmap"
type="optional"
versionRange="[1.21.1,)"
ordering="NONE"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="antique_atlas"
type="optional"
versionRange="[0,)"
ordering="NONE"
side="CLIENT"
